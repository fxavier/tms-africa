spring:
  application:
    name: tms-africa
  datasource:
    url: jdbc:postgresql://localhost:5432/tms_dev
    username: tms_dev
    password: tms_dev
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Transport Management System backend
    version: 0.0.1-SNAPSHOT

logging:
  level:
    root: INFO

tms:
  security:
    permissive-mode: true
  superuser:
    username: ${TMS_SUPERUSER_USERNAME:superuser}
    password: ${TMS_SUPERUSER_PASSWORD:ChangeMe123!}
    email: ${TMS_SUPERUSER_EMAIL:superuser@tms.local}
    first-name: ${TMS_SUPERUSER_FIRST_NAME:System}
    last-name: ${TMS_SUPERUSER_LAST_NAME:Superuser}
